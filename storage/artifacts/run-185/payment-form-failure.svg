<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Payment form failure screenshot placeholder</title>
  <desc id="desc">A local placeholder artifact for a payment form validation failure.</desc>
  <rect width="960" height="540" fill="#020617"/>
  <rect x="64" y="44" width="832" height="452" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="102" y="104" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Payment details</text>
  <text x="104" y="156" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="15">Cardholder name</text>
  <rect x="104" y="174" width="752" height="52" rx="6" fill="#111827" stroke="#be123c"/>
  <text x="126" y="208" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="18">empty after validation error</text>
