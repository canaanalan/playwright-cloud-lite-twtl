name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Lint, build, and Playwright smoke tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./dev.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Prepare demo database
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Playwright demo tests
        run: npm run test:demo

      - name: Upload Playwright debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-debug-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
